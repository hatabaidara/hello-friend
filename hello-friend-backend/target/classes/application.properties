spring.application.name=hello-friend-backend
server.port=${PORT:8081}

# Datasource configuration - prefer environment-provided JDBC URL (for Render/Heroku style),
# then legacy SPRING_DATASOURCE_* variables, otherwise fallback to an H2 in-memory DB.
# For a MySQL service set JDBC_DATABASE_URL=jdbc:mysql://host:3306/db?params,
# JDBC_DATABASE_USERNAME and JDBC_DATABASE_PASSWORD, and optionally JDBC_DATABASE_DRIVER=com.mysql.cj.jdbc.Driver

spring.datasource.url=${JDBC_DATABASE_URL:${SPRING_DATASOURCE_URL:jdbc:h2:mem:hello_friend;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}}
spring.datasource.username=${JDBC_DATABASE_USERNAME:${SPRING_DATASOURCE_USERNAME:sa}}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
spring.datasource.driver-class-name=${JDBC_DATABASE_DRIVER:${SPRING_DATASOURCE_DRIVER:org.h2.Driver}}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HBMODE:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
# Let Hibernate auto-detect dialect if none provided; set HIBERNATE_DIALECT env var to force one.
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:}
