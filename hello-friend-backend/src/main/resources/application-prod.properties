# Production profile: expect environment-provided JDBC URL
server.port=${PORT:8080}

spring.datasource.url=${JDBC_DATABASE_URL:${SPRING_DATASOURCE_URL}}
spring.datasource.username=${JDBC_DATABASE_USERNAME:${SPRING_DATASOURCE_USERNAME}}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:${SPRING_DATASOURCE_PASSWORD}}
spring.datasource.driver-class-name=${JDBC_DATABASE_DRIVER:${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}}

# Production JPA settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Production should not expose H2 console
spring.h2.console.enabled=false

# Prefer disabling startup DDL in prod; use migrations (Flyway/Liquibase) instead
# If you use a migration tool, set spring.flyway.enabled=true and configure DB credentials via env vars.
